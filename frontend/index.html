<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <!-- 强制竖屏显示 - 对移动设备生效 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="K线预测">
    <link rel="manifest" href="/manifest.json">
    <title>相似K线类比预测系统</title>
    <style>
      /* 安全区域支持（用于刘海屏/挖孔屏） */
      html {
        --safe-area-inset-top: env(safe-area-inset-top, 0px);
        --safe-area-inset-right: env(safe-area-inset-right, 0px);
        --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-inset-left: env(safe-area-inset-left, 0px);
      }

      body {
        padding-top: var(--safe-area-inset-top);
        padding-right: var(--safe-area-inset-right);
        padding-bottom: var(--safe-area-inset-bottom);
        padding-left: var(--safe-area-inset-left);
        margin: 0;
      }

      /* 禁止横屏显示 */
      @media (max-width: 1200px) {
        html {
          /* 确保竖屏高度 */
          width: 100%;
          height: 100%;
        }

        body {
          width: 100%;
          height: 100%;
          max-width: 100vw;
          overflow-x: hidden;
        }
      }

      /* 如果设备旋转到横屏，显示提示 */
      @media (max-width: 1200px) and (orientation: landscape) {
        #app {
          display: none;
        }

        body::before {
          content: '请将设备旋转为竖屏模式';
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: #1e3a8a;
          color: white;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 18px;
          z-index: 9999;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
      }

      /* 竖屏模式正常显示 */
      @media (max-width: 1200px) and (orientation: portrait) {
        body::before {
          display: none !important;
        }

        #app {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // 检测设备类型和方向
      (function() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isTablet = /iPad|Android/i.test(navigator.userAgent) && !/iPhone/i.test(navigator.userAgent);

        // 存储设备信息到 window 对象，供 Vue 组件使用
        window.__DEVICE_INFO__ = {
          isMobile: isMobile,
          isTablet: isTablet,
          isLandscape: window.innerWidth > window.innerHeight,
          userAgent: navigator.userAgent
        };

        // 尝试使用 ScreenOrientation API 锁定竖屏方向（仅适用于移动设备）
        if (isMobile && screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('portrait-primary').catch(function(error) {
            console.log('屏幕方向锁定失败:', error);
          });
        }

        // 监听方向变化事件
        window.addEventListener('orientationchange', function() {
          window.__DEVICE_INFO__.isLandscape = window.innerWidth > window.innerHeight;
          window.dispatchEvent(new CustomEvent('deviceOrientationChange', {
            detail: window.__DEVICE_INFO__
          }));

          // 如果检测到横屏，尝试重新锁定竖屏
          if (isMobile && !window.__DEVICE_INFO__.isLandscape === false && screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('portrait-primary').catch(function(error) {
              console.log('屏幕方向重新锁定失败:', error);
            });
          }
        });

        // 监听 resize 事件以检测模拟器或桌面缩放
        window.addEventListener('resize', function() {
          const wasLandscape = window.__DEVICE_INFO__.isLandscape;
          const isNowLandscape = window.innerWidth > window.innerHeight;
          if (wasLandscape !== isNowLandscape) {
            window.__DEVICE_INFO__.isLandscape = isNowLandscape;
            window.dispatchEvent(new CustomEvent('deviceOrientationChange', {
              detail: window.__DEVICE_INFO__
            }));
          }
        });

        // 禁用设备默认的旋转手势（如果支持）
        document.addEventListener('fullscreenchange', function() {
          if (isMobile && screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('portrait-primary').catch(function(error) {
              console.log('全屏时屏幕方向锁定失败:', error);
            });
          }
        });
      })();
    </script>
  </body>
</html>
